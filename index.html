<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>Tamil Discovery</title>
    <style>
        body { background: #141414; color: white; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #E50914; }
        .posters { display: flex; gap: 15px; overflow-x: auto; padding: 20px; }
        .movie-card { min-width: 180px; border: 3px solid transparent; cursor: pointer; outline: none; }
        .movie-card:focus { transform: scale(1.1); border-color: white; }
        .movie-card img { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>TAMIL DISCOVERY</h1>
    <div id="movie-list" class="posters">Loading movies...</div>

    <script>
        const API_KEY = '34a9daea5fdead58bfaac3eeffdf7be7'; 
        const container = document.getElementById('movie-list');

        async function loadMovies() {
            try {
                const url = `https://themoviedb.org{API_KEY}&with_original_language=ta&sort_by=popularity.desc`;
                const resp = await fetch(url);
                const data = await resp.json();
                
                container.innerHTML = ''; // Clear the "Loading" text

                data.results.forEach(movie => {
                    if (movie.poster_path) {
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.tabIndex = "0"; 
                        card.innerHTML = `<img src="https://tmdb.org{movie.poster_path}">`;
                        
                        // Click or Enter to go to IMDb
                        const goToIMDb = async () => {
                            const res = await fetch(`https://themoviedb.org{movie.id}?api_key=${API_KEY}&append_to_response=external_ids`);
                            const details = await res.json();
                            window.open(`https://imdb.com{details.external_ids.imdb_id}/`, '_blank');
                        };

                        card.onclick = goToIMDb;
                        card.onkeydown = (e) => { if (e.key === 'Enter') goToIMDb(); };
                        
                        container.appendChild(card);
                    }
                });
                // Focus first movie for TV remote
                document.querySelector('.movie-card').focus();
            } catch (err) {
                container.innerHTML = "Error loading movies. Check API key.";
            }
        }
        loadMovies();
    </script>
</body>
</html>
